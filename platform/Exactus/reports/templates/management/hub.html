{% extends 'base.html' %}
{% block content %}
<div class="container-fluid p-0">
    <h1 class="h3 mb-3">Report Management Hub</h1>
    <div class="row">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Report Types</h5>
                    <p class="display-4">{{ total_types }}</p>
                    <a href="{% url 'reports:manage_types_list' %}" class="btn btn-primary w-100">Manage Types</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">HTML Layouts</h5>
                    <p class="display-4">{{ total_layouts }}</p>
                    <a href="{% url 'reports:manage_layouts_list' %}" class="btn btn-success w-100">Manage Layouts</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Configurations</h5>
                    <p class="display-4">{{ total_configs }}</p>
                    <a href="{% url 'reports:manage_configs_list' %}" class="btn btn-info text-white w-100">Manage Rules</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
