{% load i18n %}
<header>
  <div class="container nav-container">
    <a href="{% url 'home:home' %}" class="logo" style="text-decoration:none;">
      <div class="sidebar-brand">ExactusPay</div>
    </a>

    <ul class="nav-links">
      <li><a href="{% url 'home:home' %}">{% trans "Home" %}</a></li>
      <li><a href="{% url 'home:features' %}">{% trans "Features" %}</a></li>
      <li><a href="{% url 'home:platform' %}">{% trans "Platform" %}</a></li>
      <li><a href="{% url 'home:country_hub' %}">{% trans "Countries" %}</a></li>
      <li><a href="{% url 'home:security' %}">{% trans "Security" %}</a></li>
      <li><a href="{% url 'home:pricing' %}">{% trans "Pricing" %}</a></li>
    </ul>

    <div class="nav-actions">
      <a href="{{ external_payroll_login_url }}" class="btn btn-secondary">{% trans "Log In" %}</a>
      <a href="{% url 'home:demo' %}" class="btn btn-primary">{% trans "Request Demo" %}</a>

      <form class="lang-form" action="{% url 'set_language' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.get_full_path }}">

        <div class="lang-pill" title="{% trans 'Language' %}">
          <select class="lang-select" name="language" aria-label="{% trans 'Select language' %}" onchange="window.switchSiteLanguage(this)">
            {% for lang in languages %}
              {% if lang.code == "pt" %}
                <option value="pt" {% if lang.code == LANGUAGE_CODE %}selected{% endif %}>🇧🇷</option>
              {% elif lang.code == "es" %}
                <option value="es" {% if lang.code == LANGUAGE_CODE %}selected{% endif %}>🇪🇸</option>
              {% elif lang.code == "en" %}
                <option value="en" {% if lang.code == LANGUAGE_CODE %}selected{% endif %}>🇬🇧</option>
              {% else %}
                <option value="{{ lang.code }}" {% if lang.code == LANGUAGE_CODE %}selected{% endif %}>
                  {{ lang.code|upper }}
                </option>
              {% endif %}
            {% endfor %}
          </select>

          <span class="lang-caret" aria-hidden="true">
            <i class="fas fa-chevron-down"></i>
          </span>
        </div>
      </form>
    </div>
  </div>
</header>
