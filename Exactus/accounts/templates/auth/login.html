<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExactusPay – Secure Login</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        /* ---------- VARIABLES ---------- */
        :root {
            --primary: #0066CC;
            --primary-dark: #004C99;
            --primary-light: #E6F2FF;

            --secondary: #1A365D;
            --accent: #00C9B1;

            --white: #FFFFFF;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-900: #111827;

            --radius: 12px;
            --shadow-lg: 0 15px 40px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
        }

        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, var(--secondary), #2D3748);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ---------- CONTAINER ---------- */
        .login-container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        /* ---------- LEFT (HERO) ---------- */
        .login-hero {
            flex: 1;
            padding: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .login-hero::after {
            content: "";
            position: absolute;
            width: 180%;
            height: 180%;
            top: -30%;
            left: -40%;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            transform: rotate(20deg);
        }

        .brand {
            z-index: 2;
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .brand-logo {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .brand-text {
            margin-left: 12px;
            font-size: 1.9rem;
            font-weight: 700;
        }

        .hero-content h1 {
            font-size: 2.3rem;
            margin-bottom: 1rem;
            z-index: 2;
            position: relative;
        }

        .hero-content p {
            margin-bottom: 1.8rem;
            opacity: 0.95;
            z-index: 2;
            position: relative;
        }

        .features {
            list-style: none;
            padding: 0;
            z-index: 2;
            position: relative;
        }

        .features li {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .features i {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255,255,255,0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
        }

        /* ---------- RIGHT (FORM) ---------- */
        .login-form-section {
            flex: 1;
            padding: 3rem;
        }

        .form-header h2 {
            font-size: 1.9rem;
            margin-bottom: 0.3rem;
            color: var(--gray-900);
        }

        .form-header p {
            color: var(--gray-500);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--gray-700);
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border-radius: var(--radius);
            border: 1.5px solid var(--gray-200);
            background: var(--white);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,204,0.12);
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%; transform: translateY(-50%);
            color: var(--gray-500);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            color: var(--gray-500);
        }

        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .error-box {
            background: #ffe5e5;
            padding: 12px;
            border-left: 4px solid #cc0000;
            border-radius: 8px;
            color: #cc0000;
            margin-bottom: 15px;
        }

        @media (max-width: 850px) {
            .login-container {
                flex-direction: column;
                max-width: 480px;
            }

            .login-hero {
                text-align: center;
                padding: 2rem;
            }

            .hero-content p,
            .features li {
                justify-content: center;
            }
        }

    </style>
</head>

<body>

    <div class="login-container">

        <!-- HERO -->
        <div class="login-hero">

            <div class="brand">
                <div class="brand-logo">EP</div>
                <div class="brand-text">ExactusPay</div>
            </div>

            <div class="hero-content">
                <h1>Welcome Back</h1>
                <p>Sign in to your global payroll dashboard.</p>

                <ul class="features">
                    <li><i class="fas fa-shield-alt"></i>Enterprise security</li>
                    <li><i class="fas fa-globe"></i>Global compliance</li>
                    <li><i class="fas fa-chart-line"></i>Real-time insights</li>
                </ul>
            </div>
        </div>

        <!-- LOGIN FORM -->
        <div class="login-form-section">

            <div class="form-header">
                <h2>Sign In</h2>
                <p>Use your credentials to continue</p>
            </div>

            <form method="POST" novalidate>
                {% csrf_token %}

                {% if form.errors %}
                <div class="error-box">Invalid username or password.</div>
                {% endif %}

                <!-- USERNAME -->
                <div class="form-group">
                    <label for="id_username" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="username" id="id_username" class="form-input" required autofocus>
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" id="id_password" class="form-input" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- SUBMIT -->
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

        </div>
    </div>

    <script>
        function togglePassword() {
            let input = document.getElementById("id_password");
            const type = input.type === "password" ? "text" : "password";
            input.type = type;
        }
    </script>

</body>
</html>
